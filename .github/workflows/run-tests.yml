name: Run E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-e2e-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t novi-e2e-accounts .

      - name: Run tests
        id: run_tests
        continue-on-error: true
        run: |
          mkdir -p ${{ github.workspace }}/traces
          mkdir -p ${{ github.workspace }}/screenshots
          mkdir -p ${{ github.workspace }}/test-results
          docker run --rm \
            -v ${{ github.workspace }}/traces:/app/NoviE2E.Suite.Accounts.Tests/bin/Debug/net8.0/traces \
            -v ${{ github.workspace }}/screenshots:/app/NoviE2E.Suite.Accounts.Tests/bin/Debug/net8.0/screenshots \
            -v ${{ github.workspace }}/test-results:/app/NoviE2E.Suite.Accounts.Tests/bin/Debug/net8.0/TestResults \
            novi-e2e-accounts

      - name: Upload startup screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: startup-screenshot
          path: screenshots/
          retention-days: 3
          if-no-files-found: ignore

      - name: Publish traces to repo (enables one-click viewer)
        id: publish_traces
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ls traces/*.zip 1>/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            mkdir -p published-traces
            cp traces/*.zip published-traces/

            git fetch origin
            git checkout -B traces-branch origin/main 2>/dev/null || git checkout -B traces-branch

            mkdir -p published-traces
            cp traces/*.zip published-traces/ 2>/dev/null || true
            git add published-traces/
            git commit -m "chore: update traces [skip ci]" --allow-empty
            git push origin traces-branch --force

            TRACE_FILE=$(ls traces/*.zip | head -1 | xargs basename)
            REPO="${{ github.repository }}"
            RAW_URL="https://raw.githubusercontent.com/${REPO}/traces-branch/published-traces/${TRACE_FILE}"
            VIEWER_URL="https://trace.playwright.dev/?trace=${RAW_URL}"

            echo "viewer_url=${VIEWER_URL}" >> $GITHUB_OUTPUT
          fi

      - name: Write job summary
        if: always()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "${{ steps.run_tests.outcome }}" == "success" ]; then
            STATUS="✅ Tests passed"
          else
            STATUS="❌ Tests failed"
          fi

          cat >> $GITHUB_STEP_SUMMARY << SUMMARY
          ## $STATUS

          | | |
          |---|---|
          | **Run** | [${{ github.run_id }}]($RUN_URL) |
          | **Branch** | \`${{ github.ref_name }}\` |
          | **Commit** | \`${{ github.sha }}\` |

          SUMMARY

          VIEWER_URL="${{ steps.publish_traces.outputs.viewer_url }}"
          if [ -n "$VIEWER_URL" ]; then
            cat >> $GITHUB_STEP_SUMMARY << SUMMARY
          ### 🔍 [Open Trace Viewer — One Click]($VIEWER_URL)

          > Requires the repository to be **public** so raw.githubusercontent.com can serve the trace.
          SUMMARY
          fi

      - name: Fail the job if tests failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1
