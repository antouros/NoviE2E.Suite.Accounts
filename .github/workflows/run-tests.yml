name: Run E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-e2e-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t novi-e2e-accounts .

      - name: Run tests
        id: run_tests
        continue-on-error: true
        run: |
          mkdir -p ${{ github.workspace }}/traces
          mkdir -p ${{ github.workspace }}/screenshots
          mkdir -p ${{ github.workspace }}/test-results
          docker run --rm \
            -v ${{ github.workspace }}/traces:/app/NoviE2E.Suite.Accounts.Tests/bin/Debug/net8.0/traces \
            -v ${{ github.workspace }}/screenshots:/app/NoviE2E.Suite.Accounts.Tests/bin/Debug/net8.0/screenshots \
            -v ${{ github.workspace }}/test-results:/app/NoviE2E.Suite.Accounts.Tests/bin/Debug/net8.0/TestResults \
            novi-e2e-accounts

      - name: Upload startup screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: startup-screenshot
          path: screenshots/
          retention-days: 3
          if-no-files-found: ignore

      - name: Publish traces to Release (one-click viewer)
        id: publish_traces
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ls traces/*.zip 1>/dev/null 2>&1; then
            # Create or update a rolling release that always holds the latest traces
            gh release create traces-latest \
              --title "Latest Playwright Traces" \
              --notes "Auto-updated on every run. Download not needed — click the link in the job summary." \
              --prerelease 2>/dev/null || true

            # Upload each trace zip, overwriting any previous version
            for f in traces/*.zip; do
              gh release upload traces-latest "$f" --clobber
            done

            # Build the one-click URL for trace.playwright.dev
            TRACE_NAME=$(basename traces/*.zip | head -1)
            REPO="${{ github.repository }}"
            TRACE_URL="https://github.com/${REPO}/releases/download/traces-latest/${TRACE_NAME}"
            VIEWER_URL="https://trace.playwright.dev/?trace=${TRACE_URL}"

            echo "viewer_url=${VIEWER_URL}" >> $GITHUB_OUTPUT
            echo "trace_name=${TRACE_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Write job summary
        if: always()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "${{ steps.run_tests.outcome }}" == "success" ]; then
            STATUS="✅ Tests passed"
          else
            STATUS="❌ Tests failed"
          fi

          cat >> $GITHUB_STEP_SUMMARY << SUMMARY
          ## $STATUS

          | | |
          |---|---|
          | **Run** | [${{ github.run_id }}]($RUN_URL) |
          | **Branch** | \`${{ github.ref_name }}\` |
          | **Commit** | \`${{ github.sha }}\` |

          SUMMARY

          VIEWER_URL="${{ steps.publish_traces.outputs.viewer_url }}"
          if [ -n "$VIEWER_URL" ]; then
            cat >> $GITHUB_STEP_SUMMARY << SUMMARY
          ### 🔍 [Open Trace Viewer]($VIEWER_URL)

          One click — no download, no extraction needed.
          SUMMARY
          fi

      - name: Fail the job if tests failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1
