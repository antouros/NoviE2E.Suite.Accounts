name: Login Scenario

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create appsettings.json from secrets
        run: |
          cat > NoviE2E.Suite.Accounts.Tests/appsettings.json << EOF
          {
            "BaseUrl": "https://www.novibet.gr",
            "Credentials": {
              "Username": "${{ secrets.NOVIBET_USERNAME }}",
              "Password": "${{ secrets.NOVIBET_PASSWORD }}"
            },
            "Playwright": {
              "Headless": true,
              "SlowMoMs": 0,
              "TraceOnFailure": true,
              "DefaultTimeoutMs": 15000
            }
          }
          EOF

      - name: Build Docker image
        run: docker build -t novi-e2e-accounts .

      - name: Run tests in container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/NoviE2E.Suite.Accounts.Tests/appsettings.json:/app/NoviE2E.Suite.Accounts.Tests/appsettings.json:ro \
            -v ${{ github.workspace }}/traces:/app/NoviE2E.Suite.Accounts.Tests/bin/Debug/net8.0/traces \
            -v ${{ github.workspace }}/test-results:/app/NoviE2E.Suite.Accounts.Tests/bin/Debug/net8.0/TestResults \
            novi-e2e-accounts

      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: traces/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
